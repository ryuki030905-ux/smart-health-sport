server:
  port: 8080

app:
  cors:
    allowed-origin-patterns: http://localhost:5173,http://127.0.0.1:5173

spring:
  application:
    name: health-sport-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/health_sport?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: your-db-username
    password: your-db-password
  data:
    redis:
      host: localhost
      port: 6379
      password:
  ai:
    service:
      base-url: http://localhost:8000
    cache:
      ttl-hours: 24
      daily-limit: 3

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: your-long-random-jwt-secret
  expire-seconds: 86400
